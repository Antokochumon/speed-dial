<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; flex-grow: 1; overflow-y: auto; align-content: start; }
        .slot { position: relative; background: #111; border-radius: 20px; border: 2px solid #222; display: flex; align-items: center; justify-content: center; min-height: 110px; }
        .btn { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 18px; border: 3px solid rgba(255,255,255,0.1); transition: 0.1s; }
        .btn:active { transform: scale(0.9); }
        .num { font-size: 50px; font-weight: 900; line-height: 1; }
        .name { font-size: 10px; text-transform: uppercase; opacity: 0.7; margin-top: 4px; text-align: center; padding: 0 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }
        .modal { background: rgba(0,0,0,0.95); position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
        
        .edit-mode .btn { animation: shake 0.3s infinite; border-color: rgba(239, 68, 68, 0.5); }
        @keyframes shake { 0% {transform: rotate(0deg)} 25% {transform: rotate(1deg)} 75% {transform: rotate(-1deg)} 100% {transform: rotate(0deg)} }
        
        .del-badge { display: none; position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; width: 28px; height: 28px; border-radius: 50%; justify-content: center; align-items: center; font-weight: bold; border: 2px solid white; z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .edit-mode .del-badge { display: flex; }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center bg-zinc-900 border-b border-zinc-800">
        <h1 class="font-bold italic text-blue-500 tracking-tighter text-xl">SPEED DIAL</h1>
        <div class="flex gap-2">
            <button onclick="toggleEdit()" id="editBtn" class="bg-zinc-800 text-zinc-400 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider">Edit</button>
            <button onclick="openM()" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider">+ Add</button>
        </div>
    </header>

    <div id="pad" class="grid"></div>

    <footer class="p-3 text-center bg-zinc-900 border-t border-zinc-800">
        <p class="text-[9px] text-zinc-500 tracking-widest uppercase">
            Designed and Developed by <span class="text-zinc-300 font-bold">Anto Kochumon</span><br>
            All Rights Reserved &copy; 2026
        </p>
    </footer>

    <div id="m" class="modal">
        <div class="bg-zinc-900 p-6 rounded-[2.5rem] w-full max-w-sm space-y-4 border border-zinc-800 shadow-2xl">
            <h2 class="text-center font-bold text-zinc-400 text-xs uppercase tracking-widest">New Contact</h2>
            
            <input type="text" id="ni" placeholder="Contact Name" class="w-full bg-zinc-800 p-4 rounded-2xl outline-none border border-transparent focus:border-blue-500 text-white">
            <input type="tel" id="pi" placeholder="Phone Number" class="w-full bg-zinc-800 p-4 rounded-2xl outline-none border border-transparent focus:border-blue-500 text-white">
            
            <div class="flex gap-2">
                <div class="flex-1">
                    <label class="text-[9px] text-zinc-500 font-bold ml-2 uppercase">Position</label>
                    <select id="si" class="w-full bg-zinc-800 p-3 mt-1 rounded-xl outline-none font-bold text-blue-400 border-none">
                        </select>
                </div>
                <div class="flex-1">
                    <label class="text-[9px] text-zinc-500 font-bold ml-2 uppercase">Color</label>
                    <input type="color" id="ci" value="#3b82f6" class="w-full h-[46px] mt-1 rounded-xl bg-zinc-800 p-1 cursor-pointer border-none">
                </div>
            </div>

            <div class="flex gap-3 pt-2">
                <button onclick="closeM()" class="flex-1 bg-zinc-800 py-4 rounded-2xl font-bold text-zinc-500">BACK</button>
                <button onclick="save()" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold">SAVE</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('dial_db')) || {};
        let editMode = false;
        
        // Generate selector options once (up to 99)
        const select = document.getElementById('si');
        for(let i=1; i<=99; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.innerHTML = "Slot " + i;
            select.appendChild(opt);
        }
        
        function call(p) {
            if (editMode) return;
            if (window.AppInventor) window.AppInventor.setWebViewString(p);
            else console.log("Calling: " + p);
        }

        function toggleEdit() {
            editMode = !editMode;
            const btn = document.getElementById('editBtn');
            const pad = document.getElementById('pad');
            if(editMode) {
                btn.innerText = "Done";
                btn.classList.replace('bg-zinc-800', 'bg-red-600');
                btn.classList.replace('text-zinc-400', 'text-white');
                pad.classList.add('edit-mode');
            } else {
                btn.innerText = "Edit";
                btn.classList.replace('bg-red-600', 'bg-zinc-800');
                btn.classList.replace('text-white', 'text-zinc-400');
                pad.classList.remove('edit-mode');
            }
        }

        function render() {
            const pad = document.getElementById('pad');
            pad.innerHTML = '';
            
            // LOGIC: Find the highest slot used, but start with at least 15
            let highestUsed = 0;
            Object.keys(db).forEach(key => {
                if (parseInt(key) > highestUsed) highestUsed = parseInt(key);
            });

            // Set grid size: 15 minimum, or higher if user added more
            let displayCount = Math.max(15, highestUsed);

            for(let i=1; i<=displayCount; i++) {
                const s = document.createElement('div');
                s.className = 'slot';
                if(db[i]) {
                    s.innerHTML = `
                        <div onclick="call('${db[i].p}')" class="btn" style="background:${db[i].c}">
                            <div class="num">${i}</div>
                            <div class="name">${db[i].n}</div>
                        </div>
                        <div onclick="del(${i})" class="del-badge">✕</div>`;
                } else {
                    s.innerHTML = `<div class="opacity-10 text-3xl font-black">${i}</div>`;
                }
                pad.appendChild(s);
            }
        }

        function save() {
            const n = document.getElementById('ni').value, p = document.getElementById('pi').value, 
                  c = document.getElementById('ci').value, i = document.getElementById('si').value;
            if(!p) return;
            db[i] = {n, p, c};
            localStorage.setItem('dial_db', JSON.stringify(db));
            closeM(); render();
        }

        function del(i) {
            delete db[i];
            localStorage.setItem('dial_db', JSON.stringify(db));
            render();
        }

        function openM() { 
            if(editMode) toggleEdit();
            document.getElementById('ni').value = '';
            document.getElementById('pi').value = '';
            document.getElementById('m').style.display = 'flex'; 
        }
        function closeM() { document.getElementById('m').style.display = 'none'; }
        
        window.onload = render;
    </script>
</body>
</html>
